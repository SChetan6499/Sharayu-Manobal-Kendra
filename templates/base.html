{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ==========================================
         BASIC META
    =========================================== -->

    <meta charset="UTF-8">

    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <meta name="theme-color" content="#2B6CB0">

    <!-- ==========================================
         SEO
    =========================================== -->

    <title>
        {% block title %}
        Sharayu Manobal Kendra | Mental Wellness Centre
        {% endblock %}
    </title>

    <meta name="description"
        content="{% block meta_description %}Professional Psychological Counselling and Mental Wellness Centre providing counselling, therapy, stress management, anxiety and depression support.{% endblock %}">

    <meta name="keywords"
        content="Psychologist, Counselling, Mental Health, Therapy, Anxiety, Depression, Stress Management, Mental Wellness, Sharayu Manobal Kendra">

    <meta name="author"
        content="Sharayu Manobal Kendra">

    <meta name="robots"
        content="index, follow">

    <link rel="canonical"
        href="{{ request.build_absolute_uri }}">

    <!-- ==========================================
         OPEN GRAPH
    =========================================== -->

    <meta property="og:type"
        content="website">

    <meta property="og:site_name"
        content="Sharayu Manobal Kendra">

    <meta property="og:title"
        content="{% block og_title %}Sharayu Manobal Kendra | Mental Wellness Centre{% endblock %}">

    <meta property="og:description"
        content="{% block og_description %}Professional Psychological Counselling & Mental Wellness Centre{% endblock %}">

    <meta property="og:url"
        content="{{ request.build_absolute_uri }}">

    <meta property="og:image"
        content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/logo.jpeg' %}">

    <meta property="og:locale"
        content="en_IN">

    <!-- ==========================================
         TWITTER
    =========================================== -->

    <meta name="twitter:card"
        content="summary_large_image">

    <meta name="twitter:title"
        content="{% block twitter_title %}Sharayu Manobal Kendra{% endblock %}">

    <meta name="twitter:description"
        content="{% block twitter_description %}Professional Psychological Counselling & Mental Wellness Centre{% endblock %}">

    <meta name="twitter:image"
        content="{{ request.scheme }}://{{ request.get_host }}{% static 'images/logo.jpeg' %}">

    <!-- ==========================================
         FAVICON
    =========================================== -->

    <link rel="icon"
        type="image/jpeg"
        href="{% static 'images/logo.jpeg' %}">

    <link rel="apple-touch-icon"
        href="{% static 'images/logo.jpeg' %}">

    <!-- ==========================================
         GOOGLE FONTS
    =========================================== -->

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- ==========================================
         BOOTSTRAP
    =========================================== -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- ==========================================
         FONT AWESOME
    =========================================== -->

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- ==========================================
         CUSTOM CSS
    =========================================== -->

    <link rel="stylesheet"
        href="{% static 'css/style.css' %}">

    {% block extra_css %}
    {% endblock %}

</head>

<body>

    <!-- ==========================
         NAVBAR
    =========================== -->

    {% include 'includes/navbar.html' %}

    <!-- ==========================
         PAGE CONTENT
    =========================== -->

    <main>

        {% block content %}
        {% endblock %}

    </main>

    <!-- ==========================
         FOOTER
    =========================== -->

    {% include 'includes/footer.html' %}

    <!-- ==========================
         SCROLL TO TOP
    =========================== -->

    <button
        onclick="topFunction()"
        id="topBtn"
        title="Go to Top"
        aria-label="Go to top">

        <i class="fa-solid fa-arrow-up"></i>

    </button>

    <!-- ==========================
         JAVASCRIPT
    =========================== -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script src="{% static 'js/script.js' %}"></script>

    {% block extra_js %}
    {% endblock %}

</body>

</html>
